# в”Җв”Җв”Җ Rigel н”„лЎңлҚ•м…ҳ Docker Compose в”Җв”Җв”Җ
# SupabaseлҠ” кіөмӢқ CLI(supabase start)лЎң лі„лҸ„ мӢӨн–ү.
# мқҙ нҢҢмқјмқҖ Rigel м•ұ(SvelteKit)л§Ң м»Ён…Ңмқҙл„ҲлЎң мӢӨн–үн•©лӢҲлӢӨ.
#
# мӮ¬мҡ©лІ•:
#   1. supabase start (Supabase м„ңл№„мҠӨ мӢӨн–ү)
#   2. docker compose up -d (Rigel м•ұ мӢӨн–ү)
#   3. http://localhost:3000 м ‘мҶҚ

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-http://localhost:54321}
      PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
      ORIGIN: ${SITE_URL:-http://localhost:3000}
      PORT: ${APP_PORT:-3000}
