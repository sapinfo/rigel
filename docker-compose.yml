# ─── Rigel App Container (ONLY) ───
# Supabase는 supabase-docker/ 에서 별도 compose로 실행됨.
# 이 파일은 절대 Supabase 서비스를 포함하지 않음.
#
# 사용 순서 (install.sh가 자동):
#   1. cd supabase-docker && docker compose up -d
#   2. cd .. && docker compose up -d --build

name: rigel

services:
  app:
    container_name: rigel-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-http://localhost:8000}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    environment:
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-http://localhost:8000}
      PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_INTERNAL_URL: http://kong:8000
      # ORIGIN 고정 대신 reverse proxy (Cloudflare Tunnel 등)의 헤더에서 동적 해석.
      # apex + 서브도메인 + localhost 접근 모두 CSRF origin check 통과.
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"

# supabase compose가 생성한 네트워크에 가입
# docker compose → supabase_default, podman-compose → docker_default 등
# install.sh가 실제 네트워크 이름을 SUPABASE_NETWORK env로 주입
networks:
  default:
    name: ${SUPABASE_NETWORK:-supabase_default}
    external: true
