<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO 기본 -->
    <meta name="description" content="재미 한국기업을 위한 오픈소스 그룹웨어. 전결/대결/후결/합의/병렬결재 — 서버 한 대면 무료로 운영. 전자결재, 게시판, 일정, 근태, 인사 올인원." />
    <meta name="keywords" content="그룹웨어, 전자결재, 오픈소스, 한국형, 결재시스템, 게시판, 일정관리, 근태관리, 셀프호스팅, Korean groupware, approval workflow, open source" />
    <meta name="author" content="SAP Info" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://github.com/sapinfo/rigel" />

    <!-- Open Graph (Facebook, LinkedIn, KakaoTalk) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rigel — 재미 한국기업을 위한 오픈소스 그룹웨어" />
    <meta property="og:description" content="한국식 전자결재(전결/대결/후결/합의/병렬) + 게시판 + 일정 + 근태. 서버 한 대면 완전 무료." />
    <meta property="og:image" content="/hero.png" />
    <meta property="og:url" content="https://github.com/sapinfo/rigel" />
    <meta property="og:site_name" content="Rigel" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rigel — 재미 한국기업을 위한 오픈소스 그룹웨어" />
    <meta name="twitter:description" content="한국식 전자결재 + 게시판 + 일정 + 근태. 서버 한 대면 완전 무료." />
    <meta name="twitter:image" content="/hero.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rigel" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-gray-50 text-gray-900 antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
